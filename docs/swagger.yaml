definitions:
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  auth.ResponseAuth:
    properties:
      token:
        type: string
      user_id:
        type: integer
    type: object
  common.PaginationResponse:
    properties:
      data: {}
      error:
        type: string
      limit:
        type: integer
      message:
        type: string
      page:
        type: integer
      success:
        type: boolean
      total:
        type: integer
    type: object
  common.Response:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  entity.Task:
    properties:
      assigneeID:
        type: integer
      createdAt:
        type: string
      createdBy:
        type: integer
      description:
        type: string
      id:
        type: integer
      status:
        $ref: '#/definitions/entity.TaskStatus'
      teamID:
        type: integer
      title:
        type: string
      updatedAt:
        type: string
    type: object
  entity.TaskStatus:
    enum:
    - todo
    - in_progress
    - done
    type: string
    x-enum-varnames:
    - StatusTodo
    - StatusInProgress
    - StatusDone
  task.CreateTaskRequest:
    properties:
      assignee_id:
        example: 1
        type: integer
      description:
        example: Description
        minLength: 3
        type: string
      team_id:
        example: 1
        type: integer
      title:
        example: Task
        maxLength: 100
        minLength: 3
        type: string
    required:
    - assignee_id
    - team_id
    - title
    type: object
  task.ResponseTask:
    properties:
      assignee_id:
        example: 1
        type: integer
      created_at:
        example: "2024-01-01T00:00:00Z"
        type: string
      created_by:
        example: 1
        type: integer
      description:
        example: Description
        type: string
      id:
        example: 1
        type: integer
      status:
        example: todo
        type: string
      team_id:
        example: 1
        type: integer
      title:
        example: Task
        type: string
    type: object
  team.CreateTeamRequest:
    properties:
      name:
        example: My Team
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  team.CreateTeamResponse:
    properties:
      created_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      created_by:
        example: 123
        type: integer
      id:
        example: 1
        type: integer
      name:
        example: My Team
        type: string
      role:
        example: owner
        type: string
    type: object
  team.InviteUserRequest:
    properties:
      user_id:
        example: 456
        type: integer
    required:
    - user_id
    type: object
  team.InviteUserResponse:
    properties:
      joined_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      role:
        example: member
        type: string
      team_id:
        example: 1
        type: integer
      user_id:
        example: 456
        type: integer
    type: object
  team.TeamInfo:
    properties:
      created_at:
        example: "2024-01-01T10:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      joined_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      name:
        example: My Team
        type: string
      role:
        example: member
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для системы управления задачами
  title: TaskForge API
  version: "1.0"
paths:
  /api/v1/login:
    post:
      consumes:
      - application/json
      description: Выполняет вход пользователя в систему
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.ResponseAuth'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      summary: Аутентификация пользователя
      tags:
      - auth
  /api/v1/register:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя в системе
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.ResponseAuth'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Регистрация нового пользователя
      tags:
      - auth
  /api/v1/tasks:
    get:
      consumes:
      - application/json
      description: Retrieves a paginated list of tasks with optional filtering. Requires
        authentication.
      parameters:
      - description: Filter by team ID
        in: query
        name: team_id
        type: integer
      - description: Filter by status (todo, in_progress, done)
        in: query
        name: status
        type: string
      - description: Filter by assignee ID
        in: query
        name: assignee_id
        type: integer
      - description: 'Page number (default: 1)'
        in: query
        name: page
        type: integer
      - description: 'Items per page (default: 10, max: 100)'
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Tasks retrieved successfully
          schema:
            allOf:
            - $ref: '#/definitions/common.PaginationResponse'
            - properties:
                Data:
                  items:
                    $ref: '#/definitions/entity.Task'
                  type: array
              type: object
        "400":
          description: Invalid query parameters
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: List tasks
      tags:
      - tasks
    post:
      consumes:
      - application/json
      description: Creates a new task with the provided details. Requires authentication.
      parameters:
      - description: Task creation request
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/task.CreateTaskRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Task created successfully
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                Data:
                  $ref: '#/definitions/task.ResponseTask'
              type: object
        "400":
          description: Invalid request body
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Create a new task
      tags:
      - tasks
  /api/v1/tasks/{id}:
    put:
      consumes:
      - application/json
      description: Updates an existing task. Requires authentication.
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Task updated successfully
          schema:
            $ref: '#/definitions/task.ResponseTask'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Update a task
      tags:
      - tasks
  /api/v1/tasks/{id}/history:
    get:
      consumes:
      - application/json
      description: Retrieves the history of changes for a specific task. Requires
        authentication.
      parameters:
      - description: Task ID
        in: path
        name: id
        required: true
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: Task history retrieved successfully
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal server error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - ApiKeyAuth: []
      summary: Get task history
      tags:
      - tasks
  /api/v1/teams:
    get:
      description: Возвращает список команд, в которых состоит пользователь
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/team.TeamInfo'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - BearerAuth: []
      summary: Получить команды пользователя
      tags:
      - teams
    post:
      consumes:
      - application/json
      description: Создает новую команду и делает пользователя владельцем
      parameters:
      - description: Данные для создания команды
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/team.CreateTeamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/team.CreateTeamResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - BearerAuth: []
      summary: Создать команду
      tags:
      - teams
  /api/v1/teams/{id}/invite:
    post:
      consumes:
      - application/json
      description: Приглашает пользователя в команду (только для owner/admin)
      parameters:
      - description: ID команды
        in: path
        name: id
        required: true
        type: integer
      - description: Данные для приглашения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/team.InviteUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/team.InviteUserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - BearerAuth: []
      summary: Пригласить в команду
      tags:
      - teams
swagger: "2.0"
