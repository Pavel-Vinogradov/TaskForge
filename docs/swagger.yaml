definitions:
  auth.LoginRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
    required:
    - email
    - password
    type: object
  auth.RegisterRequest:
    properties:
      email:
        type: string
      password:
        minLength: 6
        type: string
      username:
        minLength: 3
        type: string
    required:
    - email
    - password
    - username
    type: object
  auth.ResponseAuth:
    properties:
      token:
        type: string
      user_id:
        type: integer
    type: object
  common.Response:
    properties:
      data: {}
      error:
        type: string
      message:
        type: string
      success:
        type: boolean
    type: object
  team.CreateTeamRequest:
    properties:
      name:
        example: My Team
        maxLength: 100
        minLength: 3
        type: string
    required:
    - name
    type: object
  team.CreateTeamResponse:
    properties:
      created_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      created_by:
        example: 123
        type: integer
      id:
        example: 1
        type: integer
      name:
        example: My Team
        type: string
      role:
        example: owner
        type: string
    type: object
  team.InviteUserRequest:
    properties:
      user_id:
        example: 456
        type: integer
    required:
    - user_id
    type: object
  team.InviteUserResponse:
    properties:
      joined_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      role:
        example: member
        type: string
      team_id:
        example: 1
        type: integer
      user_id:
        example: 456
        type: integer
    type: object
  team.TeamInfo:
    properties:
      created_at:
        example: "2024-01-01T10:00:00Z"
        type: string
      id:
        example: 1
        type: integer
      joined_at:
        example: "2024-01-01T12:00:00Z"
        type: string
      name:
        example: My Team
        type: string
      role:
        example: member
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: API для системы управления задачами
  title: TaskForge API
  version: "1.0"
paths:
  /api/v1/login:
    post:
      consumes:
      - application/json
      description: Выполняет вход пользователя в систему
      parameters:
      - description: Данные для входа
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/auth.ResponseAuth'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      summary: Аутентификация пользователя
      tags:
      - auth
  /api/v1/register:
    post:
      consumes:
      - application/json
      description: Создает нового пользователя в системе
      parameters:
      - description: Данные для регистрации
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/auth.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.ResponseAuth'
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Регистрация нового пользователя
      tags:
      - auth
  /api/v1/teams:
    get:
      description: Возвращает список команд, в которых состоит пользователь
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  items:
                    $ref: '#/definitions/team.TeamInfo'
                  type: array
              type: object
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - BearerAuth: []
      summary: Получить команды пользователя
      tags:
      - teams
    post:
      consumes:
      - application/json
      description: Создает новую команду и делает пользователя владельцем
      parameters:
      - description: Данные для создания команды
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/team.CreateTeamRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/team.CreateTeamResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - BearerAuth: []
      summary: Создать команду
      tags:
      - teams
  /api/v1/teams/{id}/invite:
    post:
      consumes:
      - application/json
      description: Приглашает пользователя в команду (только для owner/admin)
      parameters:
      - description: ID команды
        in: path
        name: id
        required: true
        type: integer
      - description: Данные для приглашения
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/team.InviteUserRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            allOf:
            - $ref: '#/definitions/common.Response'
            - properties:
                data:
                  $ref: '#/definitions/team.InviteUserResponse'
              type: object
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/common.Response'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/common.Response'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/common.Response'
      security:
      - BearerAuth: []
      summary: Пригласить в команду
      tags:
      - teams
swagger: "2.0"
